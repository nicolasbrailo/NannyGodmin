<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Config - NannyGodmin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="{{ url_for('favicon') }}" type="image/x-icon">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <p><a href="{{ url_for('dashboard') }}">&larr; Back to Dashboard</a></p>
    <h1><img src="{{ url_for('favicon') }}" alt="">Config</h1>

    <form action="{{ url_for('config_save') }}" method="post">
        <h2>Provisioning</h2>
        <label>
            Poll interval (seconds)
            <input type="number" name="poll_interval_secs" value="{{ config.poll_interval_secs }}" min="1">
        </label>

        <h2>Usage Alerts</h2>
        <label>
            Daily usage limit (minutes, blank to disable)
            <input type="number" name="daily_limit_mins" value="{{ config.daily_limit_mins if config.daily_limit_mins is not none else '' }}" min="1">
        </label>
        <label>
            <input type="checkbox" name="auto_lock" {{ 'checked' if config.auto_lock }}>
            Auto-lock devices when limit is reached
        </label>

        <div style="margin-top:16px">
            <button type="submit" class="btn-details">Save</button>
        </div>
    </form>
</body>
</html>
