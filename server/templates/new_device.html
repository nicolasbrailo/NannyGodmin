<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Add New Device - NannyGodmin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; text-align: center; }
        h1 { color: #333; }
        .qr-container { margin: 30px 0; }
        .qr-container img { border: 8px solid #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
        .url-info { color: #666; font-size: 0.9em; word-break: break-all; margin-top: 10px; }
        a { color: #0066cc; }
    </style>
</head>
<body>
    <h1>Add New Device</h1>
    <p>Scan this QR code with the NannyGodmin app on the Android device to register it.</p>
    <div class="qr-container">
        <img src="data:image/png;base64,{{ qr_b64 }}" alt="QR Code">
    </div>
    <p class="url-info">{{ qr_data }}</p>
    <p><a href="{{ url_for('dashboard') }}">Back to Dashboard</a></p>
</body>
</html>
