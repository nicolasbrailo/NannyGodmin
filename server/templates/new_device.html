<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Add New Device - NannyGodmin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="{{ url_for('favicon') }}" type="image/x-icon">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="page-centered">
    <h1><img src="{{ url_for('favicon') }}" alt="">Add New Device</h1>
    <p>Scan this QR code with the NannyGodmin app on the Android device to register it.</p>
    <figure>
        <img src="data:image/png;base64,{{ qr_b64 }}" alt="QR Code">
    </figure>
    <p><small>{{ qr_data }}</small></p>
    <p><a href="{{ url_for('dashboard') }}">Back to Dashboard</a></p>
</body>
</html>
