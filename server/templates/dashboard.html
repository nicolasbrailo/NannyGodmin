<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>NannyGodmin Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; max-width: 900px; margin: 20px auto; padding: 0 20px; color: #333; }
        h1 { border-bottom: 2px solid #333; padding-bottom: 8px; }
        a { color: #0066cc; }
        .device-row { display: flex; align-items: center; gap: 10px; padding: 12px 15px; border: 1px solid #ddd; border-radius: 6px; margin-bottom: 8px; flex-wrap: wrap; }
        .device-name { font-weight: bold; min-width: 120px; }
        .status-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.75em; font-weight: bold; }
        .status-locked { background: #e74c3c; color: #fff; }
        .status-unlocked { background: #2ecc71; color: #fff; }
        .controls { display: flex; gap: 6px; align-items: center; flex: 1; }
        .controls form { display: inline; }
        button { padding: 6px 14px; border: none; border-radius: 4px; cursor: pointer; font-size: 0.9em; }
        .btn-lock { background: #e74c3c; color: #fff; }
        .btn-unlock { background: #2ecc71; color: #fff; }
        .btn-vol { background: #3498db; color: #fff; }
        .btn-details { background: #555; color: #fff; font-size: 0.85em; }
        input[type=range] { vertical-align: middle; width: 100px; }
        .spacer { flex: 1; }
        .empty { color: #999; font-style: italic; }
    </style>
</head>
<body>
    <h1>NannyGodmin Dashboard</h1>
    <p><a href="{{ url_for('new_device') }}">+ Add New Device</a></p>

    {% if devices %}
    {% for device in devices %}
    <div class="device-row">
        <span class="device-name">{{ device.name }}</span>
        {% if device.locked %}
        <span class="status-badge status-locked">LOCKED</span>
        {% else %}
        <span class="status-badge status-unlocked">UNLOCKED</span>
        {% endif %}
        <div class="controls">
            {% if device.locked %}
            <form action="{{ url_for('send_command', device_id=device.id) }}" method="post">
                <input type="hidden" name="action" value="unlock">
                <button type="submit" class="btn-unlock">Unlock</button>
            </form>
            {% else %}
            <form action="{{ url_for('send_command', device_id=device.id) }}" method="post">
                <input type="hidden" name="action" value="lock">
                <button type="submit" class="btn-lock">Lock</button>
            </form>
            {% endif %}
            <form action="{{ url_for('send_command', device_id=device.id) }}" method="post" style="display:flex;align-items:center;gap:6px;">
                <input type="hidden" name="action" value="set_volume">
                <label>Vol:</label>
                <input type="range" name="value" min="1" max="100" value="50">
                <button type="submit" class="btn-vol">Set</button>
            </form>
        </div>
        <a href="{{ url_for('device_detail', device_id=device.id) }}"><button class="btn-details">Details</button></a>
    </div>
    {% endfor %}
    {% else %}
    <p class="empty">No devices registered. <a href="{{ url_for('new_device') }}">Add one.</a></p>
    {% endif %}
</body>
</html>
